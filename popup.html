<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube AI & Bot Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header class="header">
    <img src="icons/icon48.png" alt="Extension icon" class="logo">
    <div class="header-text">
      <h1>YT AI &amp; Bot Detector</h1>
      <p class="subtitle">Protecting your YouTube experience</p>
    </div>
  </header>

  <section class="section">
    <h2 class="section-title">Comment Scanner</h2>

    <div class="toggle-row">
      <div class="toggle-info">
        <span class="module-icon">💬</span>
        <div>
          <strong>Comment Bot &amp; AI Scanner</strong>
          <small>Flags spam, bot, and AI-written comments</small>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-comments" checked>
        <span class="slider"></span>
      </label>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">Status Legend</h2>
    <div class="legend">
      <div class="legend-row">
        <span class="legend-badge bot">BOT</span>
        <span class="legend-desc">Spam or bot comment</span>
      </div>
      <div class="legend-row">
        <span class="legend-badge ai">AI</span>
        <span class="legend-desc">Likely AI-written comment</span>
      </div>
      <div class="legend-row">
        <span class="legend-badge human">HUMAN</span>
        <span class="legend-desc">Appears human-written</span>
      </div>
    </div>
  </section>

  <footer class="footer">
    <span class="version">v3.0.0</span>
    <button id="rescan-btn" class="link-btn" title="Clear processed markers and re-scan comments">Re-scan Comments</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
